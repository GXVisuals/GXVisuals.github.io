    <title>GXVISUALS | 3D Visualization & Kitchen Design</title>

    <style>
        .scroll-btn {
            position: fixed;
            right: 20px;
            z-index: 9999;
            width: 45px;
            height: 45px;
            background-color: #000; /* Μαύρο για να ταιριάζει με GXVisuals */
            color: white;
            border: 1px solid #444;
            border-radius: 5px; 
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .scroll-btn:hover { background-color: #333; }
        #topBtn { bottom: 75px; }
        #bottomBtn { bottom: 20px; }
    </style>
</head>

<body>
    <div id="root"></div>

    <button class="scroll-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="topBtn">↑</button>
    <button class="scroll-btn" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" id="bottomBtn">↓</button>

    <script type="module" src="/src/main.tsx"></script>
</body>
